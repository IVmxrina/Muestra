
<div class="contenidos-body">

  <h1>Listado de Muestras</h1>

  <mat-form-field>
    <mat-label>Filter</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Ex. ium" #input>
  </mat-form-field>

  <!-- Esto muestra el spinner de carga mientras la api no devuelva los datos requeridos-->
    @if (visible == false) {
      <div class="spinner-body">
        <mat-spinner class="spinner"></mat-spinner>
      </div>
    }


    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="dataSource">

        <!-- Position Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef> Nombre </th>
          <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
        </ng-container>

        <!-- Weight Column -->
        <ng-container matColumnDef="descripcion">
          <th mat-header-cell *matHeaderCellDef> Descripción </th>
          <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>
            <mat-icon [routerLink]="['/anadirMuestra']"  matToolTip="Añadir una nueva muestra" aria-hidden="false" aria-label="Example home icon" fontIcon="add"></mat-icon>
          </th>
          <td mat-cell *matCellDef="let element">
            <mat-icon [routerLink]="['/verMuestra/', element?.id]" (click)="check(element.id)" matToolTip="Detalles" aria-hidden="false" aria-label="Example home icon" fontIcon="search"></mat-icon>
            <mat-icon [routerLink]="['/editarMuestra/', element?.id]" matToolTip="Editar" aria-hidden="false" aria-label="Example home icon" fontIcon="edit"></mat-icon>
            <mat-icon [routerLink]="['/eliminarMuestra/', element?.id]" matToolTip="Eliminar" aria-hidden="false" aria-label="Example home icon" fontIcon="delete"></mat-icon>
          </td>
        </ng-container>



        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                    showFirstLastButtons
                    aria-label="Select page of periodic elements">
      </mat-paginator>
    </div>
</div>

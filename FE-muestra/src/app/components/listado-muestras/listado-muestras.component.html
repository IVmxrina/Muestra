<h1>Listado de Muestras</h1>

<mat-form-field>
  <mat-label>Filter</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Ex. ium" #input>
</mat-form-field>

<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource">

    <!-- Position Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let element"> {{element.id}} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef> Nombre </th>
      <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
    </ng-container>

    <!-- Weight Column -->
    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef> Descripción </th>
      <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>
        <button [routerLink]="['/anadirMuestra']">Agregar muestra</button>
      </th>
      <td mat-cell *matCellDef="let element">
        <mat-icon [routerLink]="['/verMuestra', 1]" matToolTip="Detales" aria-hidden="false" aria-label="Example home icon" fontIcon="search"></mat-icon>
        <mat-icon [routerLink]="['/editarMuestra', 1]" matToolTip="Editar" aria-hidden="false" aria-label="Example home icon" fontIcon="edit"></mat-icon>
        <mat-icon [routerLink]="['/eliminarMuestra', 1]" matToolTip="Eliminar" aria-hidden="false" aria-label="Example home icon" fontIcon="delete"></mat-icon>
      </td>
    </ng-container>



    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                 showFirstLastButtons
                 aria-label="Select page of periodic elements">
  </mat-paginator>
</div>
